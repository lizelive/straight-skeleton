[workspace]
# The changelog is the release notes, so the GitHub release body is generated
# from it rather than maintained separately.
changelog_update = true
git_release_enable = true
git_tag_enable = true
# Nothing to announce until there is something to install.
publish = true
semver_check = true
dependencies_update = false

[changelog]
protect_breaking_commits = true
sort_commits = "oldest"

# Conventional Commits, grouped so the changelog reads as release notes rather
# than a git log. Anything unmatched is dropped.
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^perf", group = "Performance" },
  { message = "^doc", group = "Documentation" },
  { message = "^refactor", group = "Changed" },
  { message = "^test", skip = true },
  { message = "^chore", skip = true },
  { message = "^ci", skip = true },
  { message = "^style", skip = true },
  { body = ".*security", group = "Security" },
]
